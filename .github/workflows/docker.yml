name: Docker й•ңеғҸжһ„е»әдёҺжҺЁйҖҒ

on:
    push:
        branches:
            - main
        paths:
            - "app/**"
            - "components/**"
            - "lib/**"
            - "hook/**"
            - "api/**"
            - "message/**"
            - "Dockerfile"
            - "package.json"
            - "yarn.lock"
    workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: еҠ еӣәиҝҗиЎҢеҷЁпјҲе®Ўи®ЎжүҖжңүеҮәз«ҷи°ғз”Ёпјү
              uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
              with:
                  egress-policy: audit

            - name: жЈҖеҮәд»Јз Ғ
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: д»Һ package.json жҸҗеҸ–зүҲжң¬еҸ·
              id: version
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
                  echo "е·ІжҸҗеҸ–зүҲжң¬: $VERSION"

            - name: и®ҫзҪ® Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

            - name: зҷ»еҪ• DockerHub
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: зҷ»еҪ• GitHub е®№еҷЁжіЁеҶҢиЎЁ
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: зҷ»еҪ•йҳҝйҮҢдә‘е®№еҷЁжіЁеҶҢиЎЁ
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
              with:
                  registry: crpi-wk2d8umombj539de.cn-shanghai.personal.cr.aliyuncs.com
                  username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
                  password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

            - name: жҸҗеҸ–дҫқиө–зүҲжң¬
              id: deps
              run: |
                  NODE_VERSION=$(node -v | sed 's/v//')
                  REACT_VERSION=$(node -p "require('./package.json').dependencies.react.replace('^', '')")
                  YARN_VERSION=$(yarn -v)
                  TYPESCRIPT_VERSION=$(node -p "require('./package.json').devDependencies.typescript.replace('^', '')")
                  echo "NODE_VERSION=$NODE_VERSION" >> $GITHUB_OUTPUT
                  echo "REACT_VERSION=$REACT_VERSION" >> $GITHUB_OUTPUT
                  echo "YARN_VERSION=$YARN_VERSION" >> $GITHUB_OUTPUT
                  echo "TYPESCRIPT_VERSION=$TYPESCRIPT_VERSION" >> $GITHUB_OUTPUT
                  echo "Node: $NODE_VERSION, React: $REACT_VERSION, Yarn: $YARN_VERSION, TypeScript: $TYPESCRIPT_VERSION"

            - name: Docker е…ғж•°жҚ®пјҲдё»жөҒе®№еҷЁжіЁеҶҢиЎЁпјү
              id: meta
              uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
              with:
                images: |
                  ${{ secrets.DOCKERHUB_USERNAME }}/video_translation
                  ghcr.io/${{ github.repository }}/video_translation
                  crpi-wk2d8umombj539de.cn-shanghai.personal.cr.aliyuncs.com/xmz-1/video_translation
                # е…ій—ӯжүҖжңүй»ҳи®Өз”ҹжҲҗеҷЁ
                flavor: |
                  latest=auto
                # дҝқз•ҷзүҲжң¬еҸ·ж Үзӯҫе’Ңдҫқиө–зүҲжң¬ж Үзӯҫ
                tags: |
                  type=raw,value=${{ steps.version.outputs.VERSION }}
                  type=raw,value=node-${{ steps.deps.outputs.NODE_VERSION }}
                  type=raw,value=react-${{ steps.deps.outputs.REACT_VERSION }}
                  type=raw,value=yarn-${{ steps.deps.outputs.YARN_VERSION }}
                  type=raw,value=typescript-${{ steps.deps.outputs.TYPESCRIPT_VERSION }}

            - name: жһ„е»әе№¶жҺЁйҖҒпјҲдё»жөҒе®№еҷЁжіЁеҶҢиЎЁпјҢж”ҜжҢҒ OCIпјү
              id: build
              uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
              with:
                context: .
                platforms: linux/amd64,linux/arm64
                push: true
                tags: ${{ steps.meta.outputs.tags }}
                labels: |
                  org.opencontainers.image.source=https://github.com/xiaomizhoubaobei/video_translation
                  org.opencontainers.image.description=AI Video Real-time Translation - и§Ҷйў‘еӯ—е№•е®һж—¶зҝ»иҜ‘
                  org.opencontainers.image.licenses=AGPL-3.0
                  org.opencontainers.image.title=AI Video Real-time Translation
                  org.opencontainers.image.maintainer=зҘҒзӯұж¬Ј
                  org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
                  org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
                  org.opencontainers.image.revision=${{ github.sha }}
                  org.opencontainers.image.vendor=xiaomizhoubaobei
                  org.opencontainers.image.authors=qixiaoxin@stu.sqxy.edu.cn
                  build.url=https://github.com/xiaomizhoubaobei/video_translation/actions/runs/${{ github.run_id }}
                cache-from: type=gha
                cache-to: type=gha,mode=max
                provenance: true

            - name: е®үиЈ… cosign
              uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

            - name: дҪҝз”Ё cosign зӯҫеҗҚй•ңеғҸпјҲж— еҜҶй’ҘжЁЎејҸпјү
              env:
                  COSIGN_EXPERIMENTAL: "1"
              run: |
                  echo "дҪҝз”Ё cosign ж— еҜҶй’ҘжЁЎејҸзӯҫеҗҚй•ңеғҸ..."
                  while IFS= read -r tag; do
                      # и·іиҝҮйҳҝйҮҢдә‘ ACR й•ңеғҸпјҲдёҚж”ҜжҢҒзӯҫеҗҚпјү
                      if [[ "$tag" == *"crpi-"* ]]; then
                          echo "и·іиҝҮйҳҝйҮҢдә‘ ACR й•ңеғҸ: $tag"
                          continue
                      fi
                      echo "жӯЈеңЁзӯҫеҗҚ $tag"
                      cosign sign --yes "$tag"
                  done <<< "${{ steps.meta.outputs.tags }}"

            - name: иҜҒжҳҺ DockerHub й•ңеғҸ
              uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
              with:
                subject-name: index.docker.io/${{ secrets.DOCKERHUB_USERNAME }}/video_translation
                subject-digest: ${{ steps.build.outputs.digest }}
                push-to-registry: true

            - name: иҜҒжҳҺ GHCR й•ңеғҸ
              uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
              with:
                subject-name: ghcr.io/${{ github.repository }}/video_translation
                subject-digest: ${{ steps.build.outputs.digest }}
                push-to-registry: true

            
